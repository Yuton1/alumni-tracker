<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Registrasi Alumni</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
      <h3>Registrasi Akun</h3>
      <form id="registerForm">
        <div class="mb-3">
          <label>Username</label>
          <input type="text" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label>Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label>Pilih Data Alumni (ID)</label>
          <input type="number" id="alumniId" class="form-control" placeholder="Masukkan ID dari Master Alumni" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Daftar Sekarang</button>
      </form>
      <p class="mt-3 text-center">Sudah punya akun? <a href="login.html" class="text-decoration-none">Login di sini</a></p>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        alumni_id: document.getElementById('alumniId').value
      };

      const res = await fetch('http://localhost:8080/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.success) {
        alert('Registrasi berhasil! Silakan login.');
        window.location.href = 'login.html';
      } else {
        alert('Gagal: ' + data.message);
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('token')) {
        window.location.href = 'user.html'; // Redirect ke dashboard jika sudah login
    }
    });
  </script>
</body>
</html>
