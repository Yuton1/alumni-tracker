<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Alumni Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-sm border-0 p-4">
          <h4 class="text-center mb-4">Login Alumni Tracker</h4>
          <form id="loginForm">
            <div class="mb-3">
              <label>Username</label>
              <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
            </div>
            <div class="mb-3">
              <label>Password</label>
              <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Masuk</button>
          </form>
          <p class="mt-3 text-center">
        Belum punya akun? <a href="register.html" class="text-decoration-none">Daftar di sini</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Hanya gunakan SATU tempat untuk pengecekan login saat halaman dimuat
    document.addEventListener('DOMContentLoaded', () => {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      const userRole = localStorage.getItem('role');

      if (isLoggedIn === 'true') {
        if (userRole === 'admin') {
          window.location.replace('index.html');
        } else {
          window.location.replace('user.html');
        }
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        
        const data = await response.json(); 
        
        if (data.success) {
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('role', data.role);
          localStorage.setItem('userId', data.userId);
          
          if (data.role === 'admin') {
            window.location.replace('index.html');
          } else {
            window.location.replace('user.html');
          }
        } else {
          alert('Login Gagal: ' + (data.message || 'Username/Password salah'));
        }
      } catch (err) {
        console.error("Error:", err);
        alert('Terjadi kesalahan koneksi ke server.');
      }
    });
  </script>
</body>
</html>
